<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    body { background-color: #0f1115; color: #e2e8f0; font-family: system-ui, sans-serif; }
    .glass-panel { background: #181a20; border: 1px solid #2a2e37; border-radius: 1rem; }
    .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; letter-spacing: 0.05em; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const App = () => {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [isSyncing, setIsSyncing] = useState(false);
      const [systemData, setSystemData] = useState({ leads: [], salesTeam: [], stats: {} });

      useEffect(() => {
        // 從 GAS 獲取真實邏輯資料
        google.script.run
          .withSuccessHandler((result) => setSystemData(JSON.parse(result)))
          .getSystemData();
      }, []);

      const handleSync = () => {
        setIsSyncing(true);
        google.script.run
          .withSuccessHandler(() => setIsSyncing(false))
          .forceSyncAndDistribute();
      };

      return (
        <div className="flex h-screen overflow-hidden">
          {/* 側邊欄 */}
          <aside className="w-64 border-r border-[#2a2e37] bg-[#121419] p-6 flex flex-col">
            <div className="mb-10">
              <h1 className="text-2xl font-black text-white tracking-tight">BV PULSE</h1>
              <p className="text-xs text-blue-400 font-mono mt-1">自動分配助手 v2.0</p>
            </div>
            
            <nav className="space-y-2 flex-1">
              {[
                { id: 'dashboard', label: '當日分配概覽' },
                { id: 'sales-check', label: '業務產能審核' },
                { id: 'ai-filter', label: 'CRM & AI 過濾' }
              ].map(tab => (
                <button
                  key={tab.id}
                  onClick={() => setActiveTab(tab.id)}
                  className={`w-full text-left px-4 py-3 rounded-lg text-sm font-medium transition-colors ${
                    activeTab === tab.id ? 'bg-blue-600/20 text-blue-400 border border-blue-500/30' : 'text-slate-400 hover:text-slate-200'
                  }`}
                >
                  {tab.label}
                </button>
              ))}
            </nav>
            
            {/* Meta API 監控 */}
            <div className="mt-auto glass-panel p-4 bg-[#181a20]">
              <div className="text-xs text-slate-500 mb-1">Meta API 狀態</div>
              <div className="flex items-center gap-2">
                <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <span className="text-sm text-emerald-400 font-medium">連線正常 (無漏單)</span>
              </div>
            </div>
          </aside>

          {/* 主要內容區 */}
          <main className="flex-1 overflow-y-auto p-10 bg-[#0f1115]">
            <div className="flex justify-between items-center mb-8">
              <h2 className="text-2xl font-bold text-white">
                {activeTab === 'dashboard' && '總管監控中心'}
                {activeTab === 'sales-check' && '業務每日 30 筆達標審核'}
                {activeTab === 'ai-filter' && '意圖辨識與 CRM 舊客攔截'}
              </h2>
              <button 
                onClick={handleSync}
                className="bg-white text-black px-5 py-2.5 rounded-lg text-sm font-bold hover:bg-slate-200 flex items-center gap-2"
                disabled={isSyncing}
              >
                {isSyncing ? '執行演算與分配中...' : '手動執行 API 同步'}
              </button>
            </div>

            {/* 面板 1：總覽 */}
            {activeTab === 'dashboard' && (
              <div className="grid grid-cols-4 gap-4 mb-8">
                <div className="glass-panel p-6">
                  <div className="text-sm text-slate-400 mb-2">Meta / Google 總進件</div>
                  <div className="text-3xl font-black text-white">{systemData.stats.totalLeads || 0}</div>
                </div>
                <div className="glass-panel p-6 border-blue-500/30">
                  <div className="text-sm text-blue-400 mb-2">已成功發放業務</div>
                  <div className="text-3xl font-black text-white">{systemData.stats.distributed || 0}</div>
                </div>
                <div className="glass-panel p-6">
                  <div className="text-sm text-slate-400 mb-2">CRM 攔截 (已簽約商家)</div>
                  <div className="text-3xl font-black text-amber-400">{systemData.stats.crmFiltered || 0}</div>
                </div>
                <div className="glass-panel p-6">
                  <div className="text-sm text-slate-400 mb-2">Gemini 攔截 (搜搜哥)</div>
                  <div className="text-3xl font-black text-slate-400">{systemData.stats.aiFiltered || 0}</div>
                </div>
              </div>
            )}

            {/* 面板 2：業務審核 (重現會議中 Jim 提到的痛點) */}
            {activeTab === 'sales-check' && (
              <div className="glass-panel overflow-hidden">
                <table className="w-full text-left text-sm">
                  <thead className="bg-[#121419] text-slate-400">
                    <tr>
                      <th className="p-4 font-medium">業務人員</th>
                      <th className="p-4 font-medium">昨日陌開 (門檻 30 筆)</th>
                      <th className="p-4 font-medium">上月成交 (低於 5 筆扣配額)</th>
                      <th className="p-4 font-medium">系統自動判斷狀態</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-[#2a2e37]">
                    {systemData.salesTeam.map((sales, i) => (
                      <tr key={i} className="hover:bg-[#1f2229]">
                        <td className="p-4 text-white font-bold">{sales.name}</td>
                        <td className="p-4">
                          <span className={`font-mono text-lg ${sales.yesterdayColdCall >= 30 ? 'text-emerald-400' : 'text-red-400'}`}>
                            {sales.yesterdayColdCall}
                          </span> 筆
                        </td>
                        <td className="p-4 text-slate-300">
                          {sales.lastMonthDeals} 件 
                          {sales.penalty < 0 && <span className="ml-2 text-xs text-amber-400 bg-amber-400/10 px-2 py-1 rounded">配額 {sales.penalty}</span>}
                        </td>
                        <td className="p-4">
                          <span className={`status-badge ${sales.yesterdayColdCall >= 30 ? 'bg-emerald-500/20 text-emerald-400' : 'bg-red-500/20 text-red-400'}`}>
                            {sales.status}
                          </span>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}

            {/* 面板 3：名單過濾層 */}
            {activeTab === 'ai-filter' && (
              <div className="glass-panel overflow-hidden">
                <table className="w-full text-left text-sm">
                  <thead className="bg-[#121419] text-slate-400">
                    <tr>
                      <th className="p-4 font-medium">客戶資訊</th>
                      <th className="p-4 font-medium">聯絡方式</th>
                      <th className="p-4 font-medium">AI 意圖 / CRM 狀態</th>
                      <th className="p-4 font-medium">系統處置</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-[#2a2e37]">
                    {systemData.leads.map((lead, i) => (
                      <tr key={i}>
                        <td className="p-4">
                          <div className="text-white font-medium">{lead.company}</div>
                          <div className="text-slate-500 text-xs mt-1">{lead.name}</div>
                        </td>
                        <td className="p-4 font-mono text-slate-300">{lead.phone}</td>
                        <td className="p-4">
                          <div className={lead.type === 'CRM攔截' ? 'text-amber-400' : 'text-blue-400'}>
                            {lead.intent}
                          </div>
                        </td>
                        <td className="p-4">
                          <span className={`status-badge ${
                            lead.type === 'CRM攔截' ? 'bg-amber-500/20 text-amber-400' : 
                            lead.type === '廣告進件' ? 'bg-emerald-500/20 text-emerald-400' : 
                            'bg-slate-700/50 text-slate-400'
                          }`}>
                            {lead.status}
                          </span>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
